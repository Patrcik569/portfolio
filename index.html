  ╔══════════════════════════════════════════════════════════════╗

  ╠══════════════════════════════════════════════════════════════╣
  ║                                                                ║
  ║  本文件分为两大区域：                                            ║
  ║                                                                ║

  ║                                                                ║

  ║  • 改名字/职位    → SITE_DATA.profile                           ║
  ║  • 改联系方式     → SITE_DATA.contact                           ║
  ║  • 加/删经历      → SITE_DATA.experience 数组                   ║
  ║  • 加/删作品      → SITE_DATA.dimensions 数组                   ║
  ║  • 加/删STAR项目  → SITE_DATA.stars 数组                        ║
  ║  • 改主题色       → :root 里的 CSS 变量                         ║

<style>
  /* ===== 主题色配置（改这里就能换配色方案） ===== */
  :root {
    --bg: #0a0a14;
    --bg2: #111122;
    --card: #16162d;
    --border: #252545;
    --text: #d0d0e0;
    --text2: #8888aa;
    --accent: #5b8def;
    --accent2: #7c5ce7;
    --green: #2ecc71;
    --gold: #f0c060;
    --red: #e05555;
    --cyan: #22d3ee;
    --radius: 12px;
    --radius-sm: 8px;
    --nav-h: 52px;
  }
  /* 浅色主题 */
  [data-theme="light"] {
    --bg: #f5f5f8;
    --bg2: #ebebf0;
    --card: #ffffff;
    --border: #d8d8e0;
    --text: #1a1a2e;
    --text2: #666680;
    --accent: #3b6fd6;
    --accent2: #6c4cd7;
    --green: #1aab5e;
    --gold: #c89020;
    --red: #cc4444;
    --cyan: #0891b2;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7;
    transition: background .3s, color .3s;
  }
  a { color: var(--accent); text-decoration:none; transition:color .2s; }
  a:hover { color: var(--accent2); }

  /* ===== 导航栏 ===== */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background: rgba(10,10,20,.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 0 24px;
    display:flex; align-items:center; justify-content:center; height:var(--nav-h); gap:28px;
    transition: background .3s;
  }
  [data-theme="light"] nav { background: rgba(245,245,248,.92); }
  nav a { color: var(--text2); font-size:13px; font-weight:500; padding:6px 0; border-bottom:2px solid transparent; transition:all .2s; }
  nav a:hover, nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* 导航栏右侧工具按钮 */
  .nav-tools { position:absolute; right:16px; display:flex; gap:8px; }
  .nav-btn {
    width:34px; height:34px; border-radius:50%; border:1px solid var(--border);
    background: var(--card); color: var(--text2); cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; transition: all .2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 移动端汉堡菜单 */
  .menu-toggle { display:none; }

  /* ===== Section 通用 ===== */
  section { max-width: 1000px; margin:0 auto; padding: 80px 24px; }
  section:first-of-type { padding-top: 120px; }
  .section-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; text-align: center; }
  [data-theme="light"] .section-title { color: #1a1a2e; }
  .section-subtitle { text-align:center; color: var(--text2); font-size:15px; margin-bottom: 48px; }

  /* ===== Hero ===== */
  #hero { text-align:center; }
  .hero-avatar {
    width:120px; height:120px; border-radius:50%; background: linear-gradient(135deg, var(--accent), var(--accent2));
    margin:0 auto 24px; display:flex; align-items:center; justify-content:center; font-size:48px; color:#fff; font-weight:700;
  }
  .hero-name { font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  [data-theme="light"] .hero-name { color: #1a1a2e; }
  .hero-title { font-size: 20px; color: var(--accent); margin-bottom: 16px; font-weight: 500; }
  .hero-tags { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom: 32px; }
  .hero-tags span {
    padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    background: var(--card); border: 1px solid var(--border); color: var(--text2);
  }
  .hero-stats { display:flex; gap:36px; justify-content:center; flex-wrap:wrap; margin-bottom: 40px; }
  .hero-stat { text-align:center; }
  .hero-stat .num { font-size:36px; font-weight:800; color: var(--accent); }
  .hero-stat .label { font-size:13px; color: var(--text2); margin-top:4px; }
  .btn-primary {
    display:inline-block; padding: 12px 32px; border-radius:24px; font-size:15px; font-weight:600;
    background: var(--accent); color: #fff; border:none; cursor:pointer; transition: all .2s;
  }
  .btn-primary:hover { background: var(--accent2); color:#fff; transform: translateY(-1px); }
  .btn-outline {
    display:inline-block; padding: 12px 32px; border-radius:24px; font-size:15px; font-weight:600;
    background: transparent; color: var(--accent); border: 1.5px solid var(--accent); cursor:pointer;
    margin-left:12px; transition: all .2s;
  }
  .btn-outline:hover { background: var(--accent); color:#fff; }

  /* ===== 卡片 ===== */
  .card {
    background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
    padding: 28px; transition: all .25s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card h3 { font-size:18px; color:#fff; margin-bottom:12px; }
  [data-theme="light"] .card h3 { color: #1a1a2e; }
  .card p, .card li { font-size:14px; color: var(--text2); line-height:1.8; }
  .card ul { padding-left:18px; }
  .card .highlight { color: var(--accent); font-weight: 600; }

  /* Grid */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }

  /* ===== Timeline ===== */
  .timeline { position:relative; padding-left:32px; }
  .timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background: var(--border); }
  .timeline-item { position:relative; margin-bottom:36px; }
  .timeline-item::before {
    content:''; position:absolute; left:-28px; top:4px; width:14px; height:14px;
    border-radius:50%; background: var(--accent); border:3px solid var(--bg);
  }
  .timeline-date { font-size:13px; color: var(--accent); font-weight:600; margin-bottom:4px; }
  .timeline-title { font-size:17px; color:#fff; font-weight:600; margin-bottom:6px; }
  [data-theme="light"] .timeline-title { color: #1a1a2e; }
  .timeline-sub { font-size:14px; color: var(--text2); }
  .timeline-desc { font-size:13px; color: var(--text2); margin-top:8px; line-height:1.8; }

  /* ===== 技能条 ===== */
  .skill-bar { margin-bottom:16px; }
  .skill-bar .name { font-size:14px; color:#fff; margin-bottom:6px; font-weight:500; }
  [data-theme="light"] .skill-bar .name { color: #1a1a2e; }
  .skill-bar .bar { height:6px; background: var(--border); border-radius:3px; overflow:hidden; }
  .skill-bar .bar .fill { height:100%; border-radius:3px; width:0; transition:width 1.2s ease; }

  /* ===== 联系方式 ===== */
  .contact-item {
    display:flex; align-items:center; gap:12px; padding:16px 20px;
    background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
  }
  .contact-item .icon { font-size:24px; }
  .contact-item .val { font-size:15px; color:#fff; }
  [data-theme="light"] .contact-item .val { color: #1a1a2e; }

  /* ===== Footer ===== */
  footer { text-align:center; padding:40px 24px; color: var(--text2); font-size:13px; border-top:1px solid var(--border); }

  /* ===== 项目链接 ===== */
  .project-link {
    display:inline-block; padding:8px 20px; border-radius:20px; font-size:13px; font-weight:500;
    border: 1px solid var(--accent); color: var(--accent); margin-top:12px;
    transition: all .2s;
  }
  .project-link:hover { background: var(--accent); color:#fff; }

  /* ===== 维度标签 ===== */
  .dim-badge {
    display:inline-block; padding:4px 14px; border-radius:12px; font-size:12px; font-weight:600;
    margin-bottom:12px;
  }
  .dim-1 { background:rgba(91,141,239,.15); color: var(--accent); }
  .dim-2 { background:rgba(124,92,231,.15); color: var(--accent2); }
  .dim-3 { background:rgba(46,204,113,.15); color: var(--green); }
  .dim-4 { background:rgba(240,192,96,.15); color: var(--gold); }
  .dim-5 { background:rgba(34,211,238,.15); color: var(--cyan); }

  /* ===== 表格 ===== */
  table { width:100%; border-collapse:collapse; font-size:13px; margin: 12px 0; }
  th { background: var(--bg2); color: var(--accent); padding:10px 12px; text-align:left; font-weight:600; font-size:12px; }
  td { padding:10px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
  tr:hover td { background: rgba(91,141,239,.05); }

  /* ===== STAR 卡片 ===== */
  .star-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; margin-right:4px; }
  .star-s { background:rgba(91,141,239,.2); color: var(--accent); }
  .star-t { background:rgba(124,92,231,.2); color: var(--accent2); }
  .star-a { background:rgba(46,204,113,.2); color: var(--green); }
  .star-r { background:rgba(240,192,96,.2); color: var(--gold); }

  /* ===== 内容详情块 ===== */
  .detail-block {
    background: var(--bg2); border-radius: var(--radius-sm); padding: 20px; margin-top: 16px;
    border-left: 3px solid var(--accent);
  }
  .detail-block h4 { font-size:15px; color:#fff; margin-bottom:10px; }
  [data-theme="light"] .detail-block h4 { color: #1a1a2e; }
  .detail-block p { font-size:13px; color: var(--text2); line-height:1.8; }

  /* KPI */
  .kpi-row { display:flex; gap:16px; flex-wrap:wrap; margin: 12px 0; }
  .kpi-item {
    background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 16px; text-align:center; flex:1; min-width:120px;
  }
  .kpi-item .kpi-num { font-size:22px; font-weight:800; color: var(--accent); }
  .kpi-item .kpi-label { font-size:12px; color: var(--text2); margin-top:4px; }

  /* 文档徽章 */
  .doc-badge {
    display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:8px;
    font-size:12px; font-weight:500; background: rgba(91,141,239,.1); border:1px solid rgba(91,141,239,.3);
    color: var(--accent); margin: 4px 4px 4px 0; transition: all .2s;
  }
  .doc-badge:hover { background: rgba(91,141,239,.2); }

  /* 方法标签 */
  .method-tag {
    display:inline-block; padding:3px 10px; border-radius:6px; font-size:12px; font-weight:500;
    margin: 3px 3px; background: var(--bg2); border:1px solid var(--border); color: var(--text2);
  }

  /* ===== 回到顶部按钮 ===== */
  #back-to-top {
    position:fixed; bottom:32px; right:32px; width:44px; height:44px; border-radius:50%;
    background: var(--accent); color:#fff; border:none; cursor:pointer; font-size:20px;
    display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden;
    transition: all .3s; z-index:90; box-shadow: 0 4px 12px rgba(0,0,0,.3);
  }
  #back-to-top.visible { opacity:1; visibility:visible; }
  #back-to-top:hover { background: var(--accent2); transform: translateY(-2px); }

  /* ===== 滚动动画 ===== */
  .reveal { opacity:0; transform: translateY(30px); transition: opacity .6s ease, transform .6s ease; }
  .reveal.visible { opacity:1; transform: translateY(0); }

  /* ===== STAR 筛选按钮 ===== */
  .filter-bar { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:32px; }
  .filter-btn {
    padding:6px 18px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer;
    border:1px solid var(--border); background: var(--card); color: var(--text2); transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color:#fff; border-color: var(--accent); }

  /* ===== 加载动画 ===== */
  #loader {
    position:fixed; inset:0; z-index:9999; background: var(--bg);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
    transition: opacity .5s; 
  }
  #loader.hidden { opacity:0; pointer-events:none; }
  .loader-ring {
    width:48px; height:48px; border:3px solid var(--border); border-top-color: var(--accent);
    border-radius:50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== 响应式 ===== */
  @media (max-width:768px) {
    .grid2, .grid3, .grid4 { grid-template-columns:1fr; }
    .hero-name { font-size:32px; }
    .hero-stats { gap:20px; }
    nav { gap:12px; padding:0 8px; }
    nav a { font-size:11px; }
    .nav-tools { right:8px; }
    .nav-btn { width:30px; height:30px; font-size:14px; }
    section { padding: 60px 16px; }
    section:first-of-type { padding-top: 100px; }
    #back-to-top { bottom:20px; right:20px; }
  }

  /* ===== 打印样式 ===== */
  @media print {
    nav, #back-to-top, .nav-tools, .filter-bar, #loader { display:none !important; }
    body { background:#fff; color:#000; }
    .card { border:1px solid #ccc; break-inside:avoid; }
    section { padding: 20px 0; }
    .reveal { opacity:1 !important; transform:none !important; }
  }
</style>
</head>

// 渲染单个卡片
function renderCard(card) {
  let html = `<div class="card reveal"${card.borderColor?` style="border-color:${card.borderColor};"`:''}>`;
  html += `<h3>${card.icon||''} ${card.title}</h3>`;
  if(card.text) html += `<p>${card.text}</p>`;
  // KPI
  if(card.kpis) {
    html += `<div class="kpi-row">${card.kpis.map(k=>`<div class="kpi-item"><div class="kpi-num">${k.num}</div><div class="kpi-label">${k.label}</div></div>`).join('')}</div>`;
  }
  // 表格
  if(card.table) {
    html += `<table><tr>${card.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;
    html += card.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
    html += `</table>`;
  }
  // 要点列表
  if(card.points) {
    card.points.forEach(p=>{
      html += `<p>`;
      if(p.highlight) html += `<span class="highlight">${p.highlight}</span>`;
      if(p.boldValue) html += `<strong style="color:var(--gold);">${p.text}</strong>`;
      else html += p.text;
      html += `</p>`;
    });
  }
  // 标签
  if(card.tags) {
    html += `<p>${card.tags.map(t=>`<span class="method-tag">${t}</span>`).join('')}</p>`;
  }
  if(card.extraText) html += `<p style="margin-top:8px;">${card.extraText}</p>`;
  // 详情块
  if(card.details) {
    card.details.forEach(d=>{
      html += `<div class="detail-block"><h4>${d.title}</h4>`;
      d.points.forEach(p=>{
        html += `<p>`;
        if(p.tag) html += `<span class="method-tag">${p.tag}</span> ${p.text}`;
        else if(p.highlight) html += `<span class="highlight">${p.highlight}</span>${p.text}`;
        else html += p.text;
        html += `</p>`;
      });
      html += `</div>`;
    });
  }
  // 原始行
  if(card.rawLines) {
    card.rawLines.forEach(l=>{
      html += `<p><strong style="color:#fff;">${l.bold}</strong>${l.text}</p>`;
    });
  }
  // 备注
  if(card.note) {
    html += `<p style="margin-top:8px;color:${card.note.color||'var(--accent)'};">${card.note.text}</p>`;
  }
  html += `</div>`;
  return html;
}

// 渲染项目
function renderProjects() {
  const p = SITE_DATA.projects;
  let html = `<section id="projects">
    <h2 class="section-title reveal" style="margin-bottom:8px;">${p.title}</h2>
    <p class="section-subtitle reveal">${p.subtitle}</p>`;
  p.dimensions.forEach(dim=>{
    html += `<div style="margin-bottom:64px;" class="reveal">
      <span class="dim-badge ${dim.dimClass}">${dim.dimLabel}</span>
      <h3 style="font-size:22px;color:#fff;margin-bottom:8px;">${dim.heading}</h3>`;
    if(dim.subheading) html += `<p style="color:var(--text2);font-size:14px;margin-bottom:24px;">${dim.subheading}</p>`;
    else html += `<div style="margin-bottom:24px;"></div>`;
    // 卡片网格
    if(dim.cards.length<=2) html += `<div class="grid2">`;
    else if(dim.cards.length<=3) html += `<div class="grid3">`;
    else html += `<div class="grid2">`;
    dim.cards.forEach(c=>html+=renderCard(c));
    html += `</div>`;
    // 链接
    if(dim.links) {
      html += `<div style="margin-top:20px;">${dim.links.map((l,i)=>
        `<a href="${l.url}" class="project-link"${i>0?' style="margin-left:8px;"':''}${l.external?' target="_blank"':''}>${l.text}</a>`
      ).join('')}</div>`;
    }
    html += `</div>`;
  });
  html += `</section>`;
  return html;
}

/* ╔══════════════════════════════════════════════════════════════╗
   ║                    🎯 交互功能初始化                           ║
   ╚══════════════════════════════════════════════════════════════╝ */

function initInteractions() {
  // 1. 滚动动画 (Intersection Observer)
  const reveals = document.querySelectorAll('.reveal');
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting) {
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  reveals.forEach(r=>obs.observe(r));

  // 2. 技能条动画
  const fills = document.querySelectorAll('.fill[data-width]');
  const fillObs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting) {
        e.target.style.width = e.target.dataset.width;
        fillObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.3 });
  fills.forEach(f=>fillObs.observe(f));

  // 3. 导航高亮 (Scroll Spy)
  const navLinks = document.querySelectorAll('nav a[href^="#"]');
  const sections = document.querySelectorAll('section[id]');
  window.addEventListener('scroll', ()=>{
    let current = '';
    sections.forEach(sec=>{
      const top = sec.offsetTop - 80;
      if(window.scrollY >= top) current = sec.id;
    });
    navLinks.forEach(link=>{
      link.classList.toggle('active', link.getAttribute('href') === '#' + current);
    });
  });

  // 4. 回到顶部
  const btt = document.getElementById('back-to-top');
  window.addEventListener('scroll', ()=>{
    btt.classList.toggle('visible', window.scrollY > 400);
  });
  btt.addEventListener('click', ()=>{
    window.scrollTo({ top:0, behavior:'smooth' });
  });

  // 5. STAR 筛选
  const filterBtns = document.querySelectorAll('.filter-btn');
  const starCards = document.querySelectorAll('.star-card');
  filterBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      filterBtns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      starCards.forEach(card=>{
        if(cat==='全部' || card.dataset.cat===cat) {
          card.style.display = '';
          card.classList.add('reveal','visible');
        } else {
          card.style.display = 'none';
        }
      });
    });
  });
}

// 主题切换
function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  if(saved === 'light') {
    document.documentElement.setAttribute('data-theme','light');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
  document.getElementById('theme-toggle').addEventListener('click', ()=>{
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if(isLight) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme','dark');
      document.getElementById('theme-toggle').textContent = '🌙';
    } else {
      document.documentElement.setAttribute('data-theme','light');
      localStorage.setItem('theme','light');
      document.getElementById('theme-toggle').textContent = '☀️';
    }
  });
}

// 打印
function initPrint() {
  document.getElementById('print-btn').addEventListener('click', ()=>{
    window.print();
  });
}

// 启动
window.addEventListener('DOMContentLoaded', ()=>{
  renderAll();
  initTheme();
  initPrint();
  // 隐藏加载动画
  setTimeout(()=>{
    document.getElementById('loader').classList.add('hidden');
  }, 300);
});
</script>
